name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

env:
  ACR_NAME: collectionsgenericregistry
  ACR_LOGIN_SERVER: collectionsgenericregistry.azurecr.io
  IMAGE_NAME: collections-generic-agentic-image
  RESOURCE_GROUP: DGEM-Collections-Generic-Dev
  CONTAINERAPP_NAME: collections-generic-agentic

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Login to Azure
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # Login to ACR
    - name: ACR Login
      run: |
        echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ env.ACR_LOGIN_SERVER }} \
        --username ${{ secrets.REGISTRY_USERNAME }} --password-stdin

    # Build the image
    - name: Build Docker Image
      run: |
        docker build -t ${{ env.IMAGE_NAME }}:${{ github.run_number }} .

    # Tag the image
    - name: Tag Image
      run: |
        docker tag ${{ env.IMAGE_NAME }}:${{ github.run_number }} \
        ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}

    # Push the image
    - name: Push Image to ACR
      run: |
        docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}

    # Deploy to Azure Container App
    - name: Deploy to Azure Container Apps
      run: |
        az containerapp update \
          --name ${{ env.CONTAINERAPP_NAME }} \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --image ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}